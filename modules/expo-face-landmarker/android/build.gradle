plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
  id 'kotlin-android'
}

group = 'expo.modules.facelandmarker'
version = '0.1.0'

android {
  namespace "expo.modules.facelandmarker"
  defaultConfig {
    versionCode 1
    versionName "0.1.0"
  }
  lintOptions {
    abortOnError false
  }
  // Include the .task model file in the APK assets
  aaptOptions {
    noCompress "task"
  }
}

dependencies {
  // MediaPipe Tasks Vision for FaceLandmarker + blendshapes
  implementation 'com.google.mediapipe:tasks-vision:0.10.14'

  // VisionCamera FrameProcessorPlugin API — compileOnly since the app provides it at runtime
  compileOnly project(':react-native-vision-camera')

  // React Native — needed so ReactApplicationContext is on the classpath for VisionCameraProxy
  compileOnly 'com.facebook.react:react-android'

  // CameraX — needed so ImageProxy/imageInfo are accessible for frame.imageProxy.imageInfo.rotationDegrees
  compileOnly 'androidx.camera:camera-core:1.3.4'
}


