name: Tests

# Runs the frontend typecheck and unit suite on every PR and on pushes to main.
#
# Until this existed the frontend had NO automated signal at all. A jest runner
# and the first tests landed in 192e826, but nothing ran them, so they only
# executed when someone remembered to. That is a worse failure than a red
# build: a red build is at least visible.
#
# Every step below was confirmed green on a runner-like environment BEFORE this
# file was committed — including with `.env` moved aside, since it is gitignored
# and therefore never present here. That check is not ceremony: the backend's
# suite spent its entire life red because seven of its suites needed a
# gitignored `.env` to even load, and the failure looked like a flake. Anything
# added here should be verified the same way first.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Typecheck and unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # NOT plain `tsc`. The check-scoped project excludes ios/Pods, whose
      # bundled JS otherwise floods the output and masks real app errors.
      - name: Typecheck
        run: npm run check

      # Errors fail the build; the 277 remaining warnings do not (eslint exits 0
      # for warnings). That split is intentional — the warning backlog is
      # mostly exhaustive-deps and import hygiene, and blocking on it would
      # push people to disable the gate rather than fix anything.
      #
      # This step was NOT added when the workflow was created: lint reported 64
      # errors, and wiring a red gate would have recreated the exact failure
      # this repo just spent a day undoing. The errors were triaged instead —
      # one was a real crash (a conditionally-called hook in Onboarding that
      # could throw "Rendered more hooks than during the previous render" on
      # the first screen a new user sees). It was hiding among 35 cosmetic
      # apostrophe warnings. That is the argument for keeping this at zero.
      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:ci
