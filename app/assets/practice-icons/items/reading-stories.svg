<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-labelledby="title desc">
  <title id="title">Stories</title>
  <desc id="desc">A golden outlined storybook castle with crenellated towers, resting on a puffy cloud.</desc>
  <defs>
    <clipPath id="reading-stories-clip"><circle cx="24" cy="24" r="24"/></clipPath>
    <radialGradient id="reading-stories-glow" cx="35%" cy="26%" r="75%">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="0.55" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="reading-stories-shade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.55" stop-color="#171420" stop-opacity="0"/>
      <stop offset="1" stop-color="#171420" stop-opacity="0.16"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#reading-stories-clip)">
    <circle cx="24" cy="24" r="24" fill="currentColor"/>
    <circle cx="24" cy="24" r="24" fill="url(#reading-stories-glow)"/>
    <circle cx="24" cy="24" r="24" fill="url(#reading-stories-shade)"/>
    <circle cx="24" cy="24" r="22.9" fill="none" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="1.1"/>
    <!-- Outlined golden castle copied from the reference art: chunky brown
         line work, two-tone gold fills, castellated parapets, arched door. -->
    <g stroke="#5C3A16" stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round">
      <!-- Connecting shoulder walls sit behind the towers, slightly darker. -->
      <path d="M14.6 28.5h3.8v9.5h-3.8z" fill="#DD9526"/>
      <path d="M29.6 28.5h3.8v9.5h-3.8z" fill="#DD9526"/>
      <!-- Side tower bodies and castellated collars. -->
      <path d="M8.6 25h6v14h-6z" fill="#F3B53E"/>
      <path d="M33.4 25h6v14h-6z" fill="#F3B53E"/>
      <path d="M7.4 25V19.9h1.5v2.1h1.95v-2.1h1.5v2.1h1.95v-2.1h1.5V25z" fill="#F3B53E"/>
      <path d="M32.2 25V19.9h1.5v2.1h1.95v-2.1h1.5v2.1h1.95v-2.1h1.5V25z" fill="#F3B53E"/>
      <!-- Central keep: body, turret block, castellated parapet. -->
      <path d="M18.4 22h11.2v16.5H18.4z" fill="#F3B53E"/>
      <path d="M19.2 13.2h9.6v4.6h-9.6z" fill="#F3B53E"/>
      <path d="M19.2 15.6h9.6v2.1h-9.6z" fill="#DD9526" stroke="none"/>
      <path d="M17.2 22V15.6h1.75v2.1h2.2v-2.1h1.75v2.1h2.2v-2.1h1.75v2.1h2.2v-2.1h1.75V22z" fill="#F3B53E"/>
      <!-- Roofs: gold cones with a lighter left facet under one outline. -->
      <g stroke="none">
        <path d="M18.6 13.2 24 3.2l5.4 10z" fill="#F0A737"/>
        <path d="M24 3.2 18.6 13.2H22z" fill="#FFCB55"/>
        <path d="M7.6 19.9 11.6 9.2l4 10.7z" fill="#F0A737"/>
        <path d="M11.6 9.2 7.6 19.9h2.7z" fill="#FFCB55"/>
        <path d="M32.4 19.9 36.4 9.2l4 10.7z" fill="#F0A737"/>
        <path d="M36.4 9.2 32.4 19.9h2.7z" fill="#FFCB55"/>
      </g>
      <path d="M18.6 13.2 24 3.2l5.4 10z" fill="none"/>
      <path d="M7.6 19.9 11.6 9.2l4 10.7z" fill="none"/>
      <path d="M32.4 19.9 36.4 9.2l4 10.7z" fill="none"/>
      <!-- Rounded arch door, front and centre. -->
      <path d="M21.3 38v-7.6a2.7 2.7 0 0 1 5.4 0V38z" fill="#A9762B"/>
    </g>
    <!-- Brick flecks, no outline, like the reference texture. -->
    <g fill="#C9861F" opacity="0.8">
      <rect x="23.9" y="8.8" width="1.6" height="1" rx="0.3"/>
      <rect x="23.3" y="14" width="1.6" height="1" rx="0.3"/>
      <rect x="19.8" y="18.6" width="1.6" height="1" rx="0.3"/>
      <rect x="26.2" y="19.4" width="1.6" height="1" rx="0.3"/>
      <rect x="19.9" y="24.3" width="1.6" height="1" rx="0.3"/>
      <rect x="26.7" y="25.9" width="1.6" height="1" rx="0.3"/>
      <rect x="19.6" y="30.8" width="1.6" height="1" rx="0.3"/>
      <rect x="27.2" y="33" width="1.6" height="1" rx="0.3"/>
      <rect x="10.7" y="16.6" width="1.6" height="1" rx="0.3"/>
      <rect x="9" y="22.4" width="1.6" height="1" rx="0.3"/>
      <rect x="10.3" y="27.2" width="1.6" height="1" rx="0.3"/>
      <rect x="11.9" y="31.6" width="1.6" height="1" rx="0.3"/>
      <rect x="35.7" y="16.4" width="1.6" height="1" rx="0.3"/>
      <rect x="35.4" y="22.4" width="1.6" height="1" rx="0.3"/>
      <rect x="34.1" y="27.4" width="1.6" height="1" rx="0.3"/>
      <rect x="36.3" y="31.7" width="1.6" height="1" rx="0.3"/>
      <rect x="15.4" y="31.2" width="1.6" height="1" rx="0.3"/>
      <rect x="30.3" y="31.2" width="1.6" height="1" rx="0.3"/>
    </g>
    <!-- Puffy outlined cloud drawn over the castle base, as in the reference. -->
    <path d="M7.2 40.6a3.7 3.7 0 0 1 6-2.2 3.8 3.8 0 0 1 7.2-.8 3.7 3.7 0 0 1 7.2 0 3.8 3.8 0 0 1 7.2.8 3.4 3.4 0 0 1 5.4 1.8 4.5 4.5 0 0 1-5 3.6 5 5 0 0 1-7.4.8 4.3 4.3 0 0 1-8.2 0 4.2 4.2 0 0 1-7.2-1.4 4.4 4.4 0 0 1-5.2-2.6z" fill="#FFFCEE" stroke="#5C3A16" stroke-width="1.1" stroke-linejoin="round"/>
    <path d="M11.8 42.4c3.8 1.7 7.8 1.9 12.2.6 4.5 1.5 9 1.3 13.2-.7" fill="none" stroke="#EBD9AC" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
