<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-labelledby="title desc">
  <title id="title">Stories</title>
  <desc id="desc">A grand many-towered storybook castle rising from soft clouds.</desc>
  <defs>
